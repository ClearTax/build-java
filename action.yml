name: Build
description: Build the Java project

inputs:
  java_version:
    description: 'The java version to use'
    default: '17'
  java_distribution:
    description: 'The java distribution to use'
    default: 'zulu'
  maven_version:
    description: 'The maven version to use'
    default: '3.8.3'
  maven_flag:
    description: 'The maven flag to use'
    default: '-T 4C -B --no-transfer-progress'
  token:
    description: 'The GitHub token'
    required: true
  publish_artifacts:
    description: 'Publish the artifacts'
    default: 'false'
  ref:
    description: 'The ref to build'
    default: "${{ github.ref }}"
    required: false
  tag_name_prefix:
    description: 'Tag name prefix to be used for checkout and release tagging'
    default: ''
  aws_role_arn:
    description: 'The Amazon Resource Name (ARN) of the role to assume. This is required for s3 cache'
    default: ''
    required: false

outputs:
  version:
    description: 'The version of the artifact'
    value: ${{ steps.set-version.outputs.version }}
  is_semver:
    description: 'Whether the computed version is valid semver (true/false)'
    value: ${{ steps.set-version.outputs.is_semver }}

runs:
  using: 'composite'
  steps:
    - name: Setup Data Collection
      uses: cleartax/github-actions-metrics@main
      continue-on-error: true
      with:
        data_platform_endpoint: 'https://app-dev-http.clear.in/api/analytics/events'
        build_cache_enabled: ${{ inputs.aws_role_arn != '' }}
        
    - name: Set up JDK ${{ inputs.java_version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java_version }}
        server-id: github
        distribution: ${{ inputs.java_distribution }}
    
    - name: Configure AWS Credentials for s3 cache
      if: ${{ inputs.aws_role_arn != '' }}
      uses: aws-actions/configure-aws-credentials@v5.0.0
      with:
        aws-region: ap-south-1
        role-to-assume: ${{ inputs.aws_role_arn }}
    - name: Cache Maven repository (S3)
      uses: runs-on/cache@v4
      if: ${{ inputs.aws_role_arn != '' }}
      env:
        AWS_REGION: ap-south-1
        RUNS_ON_S3_BUCKET_CACHE: "ct-github-action-cache"
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Cache local Maven repository
      uses: actions/cache@v4
      if: ${{ inputs.aws_role_arn == '' }}
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: ${{ inputs.maven_version }}
    
    - name: Setup Git Config
      run: |
          git config --global user.email "clearci@cleartax.in"
          git config --global user.name "clearci"
      shell: bash

    - name: Check the source ref
      id: ref
      env: 
          HOTFIX: ${{ contains( inputs.ref, 'hotfix/') }}
          MASTER: ${{ inputs.ref == 'refs/heads/master' || inputs.ref == 'refs/heads/main' }}
      run: |
          echo "hotfix=$HOTFIX" >> $GITHUB_OUTPUT
          echo "master=$MASTER" >> $GITHUB_OUTPUT
      shell: bash
    
    - name: Set Version
      id: set-version
      run: |
        if [[ "$IS_MASTER" == "true" ]]; then
            VERSION=$(mvn $MAVEN_FLAG --non-recursive -q \
              build-helper:parse-version  exec:exec \
              -Dexec.executable=echo \
              -Dexec.args='${parsedVersion.majorVersion}.${parsedVersion.nextMinorVersion}.0') || {
              printf "Failed to generate version for master branch\n%s\n" "$VERSION"
              exit 1
            }
        elif [[ "$IS_HOTFIX" == "true" ]]; then
            QUALIFIER=$(mvn $MAVEN_FLAG --non-recursive -q \
              build-helper:parse-version  exec:exec \
              -Dexec.executable=echo -Dexec.args='${parsedVersion.qualifier}') || {
              printf "Failed to extract qualifier for hotfix branch\n%s\n" "$QUALIFIER"
              exit 1
            }
            if [[ -z "$QUALIFIER" ]]; then
              mvn $MAVEN_FLAG -q build-helper:parse-version \
                versions:set \
                -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}-SNAPSHOT \
                versions:commit
              mvn $MAVEN_FLAG -q scm:checkin -Dmessage="[ci skip] set snapshot version"
            fi
            VERSION=$(mvn $MAVEN_FLAG help:evaluate -Dexpression=project.version -q -DforceStdout|sed 's/-SNAPSHOT//') || {
              printf "Failed to evaluate project version for hotfix branch\n%s\n" "$VERSION"
              exit 1
            }
        else
            VERSION="dev-${GITHUB_SHA::8}"
        fi

        if [[ -z "${VERSION// }" ]]; then
          echo "Error: Version string is empty or invalid"
          exit 1
        fi

        if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "is_semver=true" >> "$GITHUB_OUTPUT"
        else
          echo "is_semver=false" >> "$GITHUB_OUTPUT"
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "## Version: $VERSION" >> "$GITHUB_STEP_SUMMARY"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GITHUB_ACTOR: clearci
        MAVEN_FLAG: ${{ inputs.maven_flag }}
        IS_MASTER: ${{ steps.ref.outputs.master }}
        IS_HOTFIX: ${{ steps.ref.outputs.hotfix }}
    
    - name: Build for production release
      if: ${{ steps.ref.outputs.master == 'true' || steps.ref.outputs.hotfix == 'true' }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GITHUB_ACTOR: clearci
        MAVEN_FLAG: ${{ inputs.maven_flag }}
        RELEASE_VERSION: ${{ steps.set-version.outputs.version }}
        TAG_NAME_PREFIX: ${{ inputs.tag_name_prefix }}
      run: |
        mvn -DskipTests $MAVEN_FLAG -Darguments=-DskipTests \
          -Dorg.slf4j.simpleLogger.showDateTime=true -Dorg.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss,SSS \
          release:clean release:prepare \
          -DtagNameFormat="${TAG_NAME_PREFIX}@{project.version}" \
          -DscmCommentPrefix="[ci skip] " \
          -DreleaseVersion="$RELEASE_VERSION" \
          -Dusername=clearci -Dpassword="$GITHUB_TOKEN"
      shell: bash

    - name: Build for dev release
      if: ${{ steps.ref.outputs.master == 'false' && steps.ref.outputs.hotfix == 'false' }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GITHUB_ACTOR: clearci
        MAVEN_FLAG: ${{ inputs.maven_flag }}
      run: mvn -DskipTests -Dorg.slf4j.simpleLogger.showDateTime=true -Dorg.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss,SSS $MAVEN_FLAG package
      shell: bash

    - name: Deploy Artifacts to Production
      if: ${{ ( steps.ref.outputs.master == 'true' || steps.ref.outputs.hotfix == 'true' ) && inputs.publish_artifacts == 'true' }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        GITHUB_ACTOR: clearci
        MAVEN_FLAG: ${{ inputs.maven_flag }}
        TAG_NAME_PREFIX: ${{ inputs.tag_name_prefix }}
        RELEASE_VERSION: ${{ steps.set-version.outputs.version }}
      run: |
        git checkout "${TAG_NAME_PREFIX}${RELEASE_VERSION}"
        mvn -fn deploy --settings ./.mvn/settings.xml $MAVEN_FLAG -DskipTests --file pom.xml
      shell: bash

    - name: Upload artifacts
      if: ${{ steps.ref.outputs.master == 'true' || steps.ref.outputs.hotfix == 'true' }}
      uses: 'actions/upload-artifact@v4'
      with:
        name: artifacts-${{ github.run_id }}
        path: |
          ${{ github.workspace }}/**/*.jar
        retention-days: 1